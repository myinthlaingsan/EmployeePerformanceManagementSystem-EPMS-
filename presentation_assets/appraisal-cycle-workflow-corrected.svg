<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <style>
      .title { font: 700 44px Arial, sans-serif; fill: #0B1638; letter-spacing: .5px; }
      .subtitle { font: 400 24px Arial, sans-serif; fill: #667085; }
      .box-title { font: 700 20px Arial, sans-serif; fill: #111827; }
      .box-text { font: 400 15px Arial, sans-serif; fill: #344054; }
      .small { font: 400 13px Arial, sans-serif; fill: #667085; }
      .num { font: 700 26px Arial, sans-serif; fill: #FFFFFF; }
      .center-title { font: 700 40px Arial, sans-serif; fill: #0B1638; }
      .center-text { font: 400 21px Arial, sans-serif; fill: #344054; }
      .pill { font: 700 16px Arial, sans-serif; fill: #FFFFFF; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#101828" flood-opacity=".12"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1A56DB"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16803C"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6B3FA0"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="#FFFFFF"/>
  <text x="800" y="70" text-anchor="middle" class="title">CYCLE-BASED PERFORMANCE MANAGEMENT WORKFLOW</text>
  <text x="800" y="108" text-anchor="middle" class="subtitle">Every KPI, evaluation, score and report is linked to one appraisal cycle.</text>

  <circle cx="800" cy="500" r="205" fill="#F8FAFC" stroke="#D0D5DD" stroke-width="2"/>
  <circle cx="800" cy="500" r="172" fill="none" stroke="#E4E7EC" stroke-width="2"/>
  <path d="M760 455 A58 58 0 0 1 845 452" fill="none" stroke="#344E9A" stroke-width="12" marker-end="url(#arrowBlue)"/>
  <path d="M840 548 A58 58 0 0 1 755 550" fill="none" stroke="#344E9A" stroke-width="12" marker-end="url(#arrowBlue)"/>
  <text x="800" y="515" text-anchor="middle" class="center-title">APPRAISAL CYCLE</text>
  <text x="800" y="552" text-anchor="middle" class="center-text">The time range that controls</text>
  <text x="800" y="580" text-anchor="middle" class="center-text">performance measurement.</text>
  <rect x="615" y="615" width="370" height="82" rx="12" fill="#EEF3FD" stroke="#B5D4F4"/>
  <text x="800" y="648" text-anchor="middle" class="center-text">Final score is calculated</text>
  <text x="800" y="676" text-anchor="middle" class="center-text">from cycle-based inputs.</text>

  <g filter="url(#shadow)">
    <rect x="600" y="155" width="400" height="145" rx="18" fill="#FFFFFF" stroke="#1A56DB" stroke-width="2"/>
    <circle cx="800" cy="155" r="31" fill="#1A56DB"/>
    <text x="800" y="164" text-anchor="middle" class="num">1</text>
    <text x="800" y="205" text-anchor="middle" class="box-title">CREATE APPRAISAL CYCLE</text>
    <text x="640" y="235" class="box-text">- Define cycle name and dates</text>
    <text x="640" y="260" class="box-text">- Set deadlines and scoring weights</text>
    <text x="640" y="285" class="box-text">- Prepare cycle for assignment</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1065" y="250" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#16803C" stroke-width="2"/>
    <circle cx="1128" cy="250" r="31" fill="#16803C"/>
    <text x="1128" y="259" text-anchor="middle" class="num">2</text>
    <text x="1215" y="295" text-anchor="middle" class="box-title">ASSIGN CYCLE WORK</text>
    <text x="1100" y="325" class="box-text">- Assign employees to cycle</text>
    <text x="1100" y="350" class="box-text">- Assign KPI objectives</text>
    <text x="1100" y="375" class="box-text">- Assign appraisal forms</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1110" y="505" width="300" height="150" rx="18" fill="#FFFFFF" stroke="#D69200" stroke-width="2"/>
    <circle cx="1172" cy="505" r="31" fill="#D69200"/>
    <text x="1172" y="514" text-anchor="middle" class="num">3</text>
    <text x="1260" y="548" text-anchor="middle" class="box-title">PERFORMANCE PERIOD</text>
    <text x="1145" y="580" class="box-text">- Employees work on KPIs</text>
    <text x="1145" y="605" class="box-text">- Progress is updated</text>
    <text x="1145" y="630" class="box-text">- Feedback and records continue</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="930" y="745" width="310" height="145" rx="18" fill="#FFFFFF" stroke="#F97316" stroke-width="2"/>
    <circle cx="995" cy="745" r="31" fill="#F97316"/>
    <text x="995" y="754" text-anchor="middle" class="num">4</text>
    <text x="1085" y="790" text-anchor="middle" class="box-title">SELF ASSESSMENT</text>
    <text x="965" y="820" class="box-text">- Employee self-review</text>
    <text x="965" y="845" class="box-text">- Reflect achievements</text>
    <text x="965" y="870" class="box-text">- Submit for manager review</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="525" y="745" width="330" height="145" rx="18" fill="#FFFFFF" stroke="#E11D48" stroke-width="2"/>
    <circle cx="600" cy="745" r="31" fill="#E11D48"/>
    <text x="600" y="754" text-anchor="middle" class="num">5</text>
    <text x="690" y="790" text-anchor="middle" class="box-title">MANAGER EVALUATION</text>
    <text x="560" y="820" class="box-text">- Manager reviews performance</text>
    <text x="560" y="845" class="box-text">- Evaluate KPI and behaviors</text>
    <text x="560" y="870" class="box-text">- Provide feedback and rating</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="235" y="540" width="315" height="155" rx="18" fill="#FFFFFF" stroke="#6B3FA0" stroke-width="2"/>
    <circle cx="320" cy="540" r="31" fill="#6B3FA0"/>
    <text x="320" y="549" text-anchor="middle" class="num">6</text>
    <text x="392" y="585" text-anchor="middle" class="box-title">SCORING</text>
    <text x="270" y="615" class="box-text">- Combine KPI, self and manager inputs</text>
    <text x="270" y="640" class="box-text">- Include 360 feedback when used</text>
    <text x="270" y="665" class="box-text">- Apply configured weights</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="285" width="315" height="150" rx="18" fill="#FFFFFF" stroke="#344E9A" stroke-width="2"/>
    <circle cx="320" cy="285" r="31" fill="#344E9A"/>
    <text x="320" y="294" text-anchor="middle" class="num">7</text>
    <text x="397" y="330" text-anchor="middle" class="box-title">REVIEW AND FINALIZE</text>
    <text x="275" y="360" class="box-text">- Review calculated results</text>
    <text x="275" y="385" class="box-text">- Calibrate if required</text>
    <text x="275" y="410" class="box-text">- Approve final appraisal result</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="625" y="825" width="350" height="100" rx="18" fill="#FFFFFF" stroke="#16803C" stroke-width="2"/>
    <circle cx="800" cy="825" r="31" fill="#16803C"/>
    <text x="800" y="834" text-anchor="middle" class="num">8</text>
    <text x="800" y="870" text-anchor="middle" class="box-title">FINAL RESULT AND REPORTS</text>
    <text x="670" y="900" class="box-text">- Overall score, grade, history and reports</text>
  </g>

  <path d="M1000 225 C1030 235 1045 245 1065 275" fill="none" stroke="#1A56DB" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M1215 400 C1225 435 1235 470 1248 505" fill="none" stroke="#16803C" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M1230 655 C1205 705 1165 730 1120 745" fill="none" stroke="#D69200" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M930 815 C900 825 880 825 855 820" fill="none" stroke="#F97316" stroke-width="5" marker-end="url(#arrowGreen)"/>
  <path d="M525 815 C500 775 475 735 430 695" fill="none" stroke="#E11D48" stroke-width="5" marker-end="url(#arrowPurple)"/>
  <path d="M320 540 C315 500 320 465 345 435" fill="none" stroke="#6B3FA0" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M555 330 C585 300 605 275 625 250" fill="none" stroke="#344E9A" stroke-width="5" marker-end="url(#arrowBlue)"/>
  <path d="M550 640 C620 705 690 760 780 825" fill="none" stroke="#16803C" stroke-width="5" marker-end="url(#arrowGreen)"/>

  <g filter="url(#shadow)">
    <rect x="80" y="390" width="230" height="250" rx="16" fill="#FFFFFF" stroke="#1A56DB" stroke-width="2"/>
    <rect x="80" y="390" width="230" height="50" rx="16" fill="#1A56DB"/>
    <text x="195" y="423" text-anchor="middle" class="pill">CYCLE INPUTS</text>
    <text x="112" y="475" class="box-text">- KPI achievement</text>
    <text x="112" y="510" class="box-text">- Self assessment</text>
    <text x="112" y="545" class="box-text">- Manager evaluation</text>
    <text x="112" y="580" class="box-text">- 360 feedback</text>
    <text x="112" y="615" class="box-text">- Performance records</text>
  </g>
  <path d="M310 515 L235 600" fill="none" stroke="#1A56DB" stroke-width="5" marker-end="url(#arrowBlue)"/>

  <g filter="url(#shadow)">
    <rect x="1290" y="355" width="250" height="330" rx="18" fill="#FFFFFF" stroke="#6B3FA0" stroke-width="2"/>
    <rect x="1290" y="355" width="250" height="62" rx="18" fill="#6B3FA0"/>
    <text x="1415" y="380" text-anchor="middle" class="pill">CONTINUOUS DURING</text>
    <text x="1415" y="403" text-anchor="middle" class="pill">THE CYCLE</text>
    <text x="1325" y="465" class="box-title">Feedback</text>
    <text x="1325" y="492" class="box-text">Collected anytime</text>
    <text x="1325" y="545" class="box-title">1-on-1 Meetings</text>
    <text x="1325" y="572" class="box-text">Check-ins and support</text>
    <text x="1325" y="625" class="box-title">Performance History</text>
    <text x="1325" y="652" class="box-text">Records kept by cycle</text>
  </g>
  <path d="M980 225 C1220 210 1415 220 1415 355" fill="none" stroke="#6B3FA0" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#arrowPurple)"/>
  <path d="M1415 685 C1415 780 1050 775 835 775" fill="none" stroke="#6B3FA0" stroke-width="3" stroke-dasharray="10 10" marker-end="url(#arrowPurple)"/>

  <rect x="360" y="942" width="25" height="4" fill="#1A56DB"/>
  <text x="400" y="950" class="small">Workflow sequence</text>
  <line x1="560" y1="944" x2="600" y2="944" stroke="#6B3FA0" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="615" y="950" class="small">Continuous activities</text>
  <rect x="820" y="932" width="28" height="18" fill="#EEF3FD" stroke="#B5D4F4"/>
  <text x="865" y="950" class="small">Cycle-based performance period</text>
</svg>
